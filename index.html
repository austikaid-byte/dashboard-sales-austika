<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austika Dashboard Business</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0F0F0F; color:#fff; font-family:Poppins; margin:0; }
.container { padding:30px; }

h1 { text-align:center; }

/* INPUT */
.box { background:#1E1E1E; padding:20px; border-radius:12px; margin-bottom:20px; }

input, button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button { background:#D4AF37; cursor:pointer; }

/* KPI */
.kpi-container { display:flex; gap:20px; margin-bottom:20px; }
.kpi {
    flex:1;
    background:#1E1E1E;
    padding:20px;
    border-radius:12px;
}

/* GRID */
.grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
.card { background:#1E1E1E; padding:20px; border-radius:12px; }
</style>
</head>

<body>

<div class="container">

<h1>SALES DASHBOARD - AUSTIKA</h1>

<!-- INPUT -->
<div class="box">
<h3>Input Penjualan</h3>

<input id="tanggal" type="date">
<input id="produk" placeholder="Produk">
<input id="qty" type="number" placeholder="Qty">

<input id="modal" type="number" placeholder="Harga Modal (HPP)">
<input id="jual" type="number" placeholder="Harga Jual">

<button onclick="tambahData()">Tambah</button>
<button onclick="resetData()">Reset</button>

</div>

<!-- KPI -->
<div class="kpi-container">

<div class="kpi">
<h3>💰 Total Penjualan</h3>
<h2 id="totalSales">Rp 0</h2>
</div>

<div class="kpi">
<h3>📦 Total Produk</h3>
<h2 id="totalQty">0</h2>
</div>

<div class="kpi">
<h3>🧾 Total Orders</h3>
<h2 id="orders">0</h2>
</div>

<div class="kpi">
<h3>🏭 Total HPP</h3>
<h2 id="totalHPP">Rp 0</h2>
</div>

<div class="kpi">
<h3>📈 Profit Bersih</h3>
<h2 id="totalProfit">Rp 0</h2>
</div>

</div>

<!-- CHART -->
<div class="grid">

<div class="card">
<h3>Penjualan per Hari</h3>
<canvas id="lineChart"></canvas>
</div>

<div>

<div class="card">
<h3>Produk Terlaris</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card" style="margin-top:20px;">
<h3>Profit per Produk</h3>
<canvas id="profitChart"></canvas>
</div>

</div>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function rupiah(x){
    return "Rp " + x.toLocaleString("id-ID");
}

function tambahData(){
    let item = {
        tanggal: document.getElementById("tanggal").value,
        produk: document.getElementById("produk").value,
        qty: parseInt(document.getElementById("qty").value),
        modal: parseInt(document.getElementById("modal").value),
        jual: parseInt(document.getElementById("jual").value)
    };

    data.push(item);
    localStorage.setItem("data", JSON.stringify(data));
    updateDashboard();
}

function resetData(){
    localStorage.clear();
    location.reload();
}

function updateDashboard(){

    let totalSales = 0;
    let totalHPP = 0;
    let totalProfit = 0;
    let totalQty = 0;

    let produkMap = {};
    let profitMap = {};
    let dateMap = {};

    data.forEach(d => {

        let sales = d.qty * d.jual;
        let hpp = d.qty * d.modal;
        let profit = sales - hpp;

        totalSales += sales;
        totalHPP += hpp;
        totalProfit += profit;
        totalQty += d.qty;

        // Produk
        if(!produkMap[d.produk]) produkMap[d.produk]=0;
        produkMap[d.produk]+=d.qty;

        // Profit per produk
        if(!profitMap[d.produk]) profitMap[d.produk]=0;
        profitMap[d.produk]+=profit;

        // Per hari
        if(!dateMap[d.tanggal]) dateMap[d.tanggal]=0;
        dateMap[d.tanggal]+=sales;
    });

    document.getElementById("totalSales").innerText = rupiah(totalSales);
    document.getElementById("totalHPP").innerText = rupiah(totalHPP);
    document.getElementById("totalProfit").innerText = rupiah(totalProfit);
    document.getElementById("totalQty").innerText = totalQty;
    document.getElementById("orders").innerText = data.length;

    renderChart(produkMap, profitMap, dateMap);
}

let c1,c2,c3;

function renderChart(pMap, prMap, dMap){

    if(c1) c1.destroy();
    if(c2) c2.destroy();
    if(c3) c3.destroy();

    c1 = new Chart(lineChart, {
        type:"line",
        data:{
            labels:Object.keys(dMap),
            datasets:[{
                data:Object.values(dMap),
                borderColor:"#D4AF37",
                tension:0.4
            }]
        }
    });

    c2 = new Chart(barChart, {
        type:"bar",
        data:{
            labels:Object.keys(pMap),
            datasets:[{
                data:Object.values(pMap),
                backgroundColor:"#D4AF37"
            }]
        }
    });

    c3 = new Chart(profitChart, {
        type:"bar",
        data:{
            labels:Object.keys(prMap),
            datasets:[{
                data:Object.values(prMap),
                backgroundColor:"#F5E6CA"
            }]
        }
    });
}

updateDashboard();
</script>

</body>
</html>
