<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Austika Sales Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: #0F0F0F;
    color: white;
}
.container {
    padding: 30px 40px;
}
h1 {
    text-align: center;
    margin-bottom: 30px;
}
.kpi-container {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}
.kpi {
    flex: 1;
    background: #1E1E1E;
    padding: 20px;
    border-radius: 12px;
}
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}
.card {
    background: #1E1E1E;
    padding: 20px;
    border-radius: 12px;
}
input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
button {
    background: #D4AF37;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>SALES DASHBOARD</h1>

    <div class="card">
        <h3>Input Data</h3>
        <input id="produk" placeholder="Produk">
        <input id="qty" type="number" placeholder="Qty">
        <input id="harga" type="number" placeholder="Harga">
        <button onclick="tambahData()">Tambah</button>
    </div>

    <div class="kpi-container">
        <div class="kpi"><h3>Total Sales</h3><h2 id="sales">0</h2></div>
        <div class="kpi"><h3>Total Produk</h3><h2 id="produkTotal">0</h2></div>
        <div class="kpi"><h3>Orders</h3><h2 id="orders">0</h2></div>
    </div>

    <div class="grid">
        <div class="card">
            <canvas id="lineChart"></canvas>
        </div>
        <div class="card">
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function tambahData(){
    let produk = document.getElementById("produk").value;
    let qty = parseInt(document.getElementById("qty").value);
    let harga = parseInt(document.getElementById("harga").value);

    data.push({produk, qty, harga});
    localStorage.setItem("data", JSON.stringify(data));

    updateDashboard();
}

function updateDashboard(){
    let totalSales = 0;
    let totalProduk = 0;
    let map = {};

    data.forEach(d => {
        totalSales += d.qty * d.harga;
        totalProduk += d.qty;

        if(!map[d.produk]) map[d.produk] = 0;
        map[d.produk] += d.qty;
    });

    document.getElementById("sales").innerText = totalSales;
    document.getElementById("produkTotal").innerText = totalProduk;
    document.getElementById("orders").innerText = data.length;

    renderChart(map);
}

let chart;
function renderChart(map){
    let labels = Object.keys(map);
    let values = Object.values(map);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: "#D4AF37"
            }]
        }
    });
}

updateDashboard();
</script>

</body>
</html>
